em;\n  border-top: 1px solid rgba(50,0,190,0.1);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-size: 11px;\n  color: #aaaabc;\n  letter-spacing: 0.02em;\n}\n<\u002Fstyle>\n    \n  <\u002Fhead>\n  <body>\n    <div class=\"page\">\n\n      <div class=\"draft-banner\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"><\u002Fpath><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"><\u002Fpath><\u002Fsvg>\n        Draft — for internal review only. Not for external distribution.\n      <\u002Fdiv>\n\n      <div class=\"hero\">\n        <div class=\"hero-eyebrow\">Likewize Moments — Tickets<\u002Fdiv>\n        <h1>Your branded ticket marketplace, delivered.<\u002Fh1>\n        <p>Likewize Moments gives your customers seamless access to a world-class secondary ticket marketplace — under your brand, integrated into your experience. This document sets out what we deliver, what you can configure, and what we'll need from you to get started.<\u002Fp>\n        <div class=\"hero-pill\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 12V22H4V12\"><\u002Fpath><path d=\"M22 7H2v5h20V7z\"><\u002Fpath><path d=\"M12 22V7\"><\u002Fpath><path d=\"M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z\"><\u002Fpath><path d=\"M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z\"><\u002Fpath><\u002Fsvg>\n          Partner portal overview\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SECTION 1 -->\n      <div class=\"section\">\n        <div class=\"section-eyebrow\">Section 1<\u002Fdiv>\n        <div class=\"section-title\">What we deliver for you<\u002Fdiv>\n        <p class=\"section-intro\">Every partner portal includes the following as standard. These are not choices — they are the foundation of what Likewize Moments is. You can rely on all of the below from day one.<\u002Fp>\n\n        <div class=\"delivery-grid\">\n          <div class=\"delivery-card\">\n            <div class=\"delivery-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z\"><\u002Fpath><path d=\"M13 5v2\"><\u002Fpath><path d=\"M13 17v2\"><\u002Fpath><path d=\"M13 11v2\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"delivery-card-title\">Full ticket inventory<\u002Fdiv>\n            <div class=\"delivery-card-desc\">Access to a live secondary ticket marketplace across sports, music, theatre, comedy and more.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"delivery-card\">\n            <div class=\"delivery-icon\">\n              <svg viewBox=\"0 0 24 24\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M2 10h20\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"delivery-card-title\">Checkout &amp; payments<\u002Fdiv>\n            <div class=\"delivery-card-desc\">Fully managed checkout flow with secure payment processing. All transactions handled end-to-end.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"delivery-card\">\n            <div class=\"delivery-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"delivery-card-title\">Customer support<\u002Fdiv>\n            <div class=\"delivery-card-desc\">End-to-end customer support delivered on behalf of your brand — business hours and out-of-hours.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"delivery-card\">\n            <div class=\"delivery-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h9\"><\u002Fpath><path d=\"m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7\"><\u002Fpath><path d=\"M16 19h6\"><\u002Fpath><path d=\"M19 16v6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"delivery-card-title\">Ticket delivery<\u002Fdiv>\n            <div class=\"delivery-card-desc\">All ticket fulfilment and delivery to your customers handled automatically via the platform.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"delivery-card\">\n            <div class=\"delivery-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M12 8v4l3 3\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"delivery-card-title\">Order history<\u002Fdiv>\n            <div class=\"delivery-card-desc\">Your customers can view, track and manage their purchase history directly within the portal.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"delivery-card\">\n            <div class=\"delivery-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"m19 9-5 5-4-4-3 3\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"delivery-card-title\">Reporting &amp; analytics<\u002Fdiv>\n            <div class=\"delivery-card-desc\">Sales and performance data available via an admin portal and Google Analytics integration.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <hr class=\"divider\">\n\n      <!-- SECTION 2 -->\n      <div class=\"section\">\n        <div class=\"section-eyebrow\">Section 2<\u002Fdiv>\n        <div class=\"section-title\">Configuration options<\u002Fdiv>\n        <p class=\"section-intro\">The items below are the decisions we'll work through together to build your portal. Some are required inputs — we can't proceed without them. Others are optional choices with sensible defaults if you'd prefer to keep things simple. Select each item to expand it.<\u002Fp>\n\n        <div class=\"accordion\">\n\n          <!-- 1. Branding -->\n          <details class=\"acc-item\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z\"><\u002Fpath><path d=\"M2 12h20\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Branding <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                <div class=\"acc-subtitle\">Logo, colours, domain and portal name<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <p class=\"acc-desc\">Your portal will carry your brand throughout — from the URL your customers visit to the colours and logo they see on every page. We'll need your brand assets and a confirmed domain to get started.<\u002Fp>\n                <div class=\"option-group\">\n                  <div class=\"toggle-row\">\n                    <div>\n                      <div class=\"toggle-label\">Portal name<\u002Fdiv>\n                      <div class=\"toggle-sublabel\">The name displayed to your customers (e.g. \"[Partner] Tickets\")<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"toggle-row\">\n                    <div>\n                      <div class=\"toggle-label\">Logo<\u002Fdiv>\n                      <div class=\"toggle-sublabel\">Your brand logo, provided as an SVG or high-resolution PNG<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"toggle-row\">\n                    <div>\n                      <div class=\"toggle-label\">Colour palette<\u002Fdiv>\n                      <div class=\"toggle-sublabel\">Primary and accent colours, provided as hex values<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"toggle-row\">\n                    <div>\n                      <div class=\"toggle-label\">Domain / URL<\u002Fdiv>\n                      <div class=\"toggle-sublabel\">The web address your customers will visit (e.g. tickets.[partner].co.uk)<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- 2. Authentication -->\n          <details class=\"acc-item\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Authentication <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                <div class=\"acc-subtitle\">How your customers log in to the portal<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <p class=\"acc-desc\">Your customers need a secure way to access the portal. We offer two approaches depending on your technical setup. Most partners with an existing digital product will already have an SSO solution in place.<\u002Fp>\n                <div class=\"option-group\">\n                  <div class=\"option-row recommended\">\n                    <div class=\"option-radio\"><\u002Fdiv>\n                    <div>\n                      <div class=\"option-label\">Use your own SSO <span class=\"rec-tag\">Recommended<\u002Fspan><\u002Fdiv>\n                      <div class=\"option-note\">If you already have a single sign-on solution, we can integrate directly. Your customers log in via your existing experience and are passed seamlessly through to the tickets portal.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"option-row\">\n                    <div class=\"option-radio\"><\u002Fdiv>\n                    <div>\n                      <div class=\"option-label\">Likewize-managed authentication<\u002Fdiv>\n                      <div class=\"option-note\">For partners without existing SSO capability, we can provide a fully managed, branded authentication layer. Customers register and log in via a Likewize-powered portal, which then passes them through to tickets.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- 3. Inventory scope -->\n          <details class=\"acc-item\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\"><polygon points=\"22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3\"><\u002Fpolygon><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Inventory scope <span class=\"badge badge-optional\">Optional<\u002Fspan><\u002Fdiv>\n                <div class=\"acc-subtitle\">Which events and categories appear in your portal<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <p class=\"acc-desc\">By default, your portal will display the full inventory — thousands of events across music, sport, theatre, festivals and more. If you'd prefer to limit what's shown, you can restrict by category, geography, or both. Most partners choose to keep the full inventory, but you may have brand or audience reasons to narrow the scope.<\u002Fp>\n\n                <div class=\"option-group\">\n                  <div class=\"option-row recommended\">\n                    <div class=\"option-radio\"><\u002Fdiv>\n                    <div>\n                      <div class=\"option-label\">Full inventory (default) <span class=\"rec-tag\">Recommended<\u002Fspan><\u002Fdiv>\n                      <div class=\"option-note\">All available events shown. Maximum choice for your customers.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"option-row\">\n                    <div class=\"option-radio\"><\u002Fdiv>\n                    <div>\n                      <div class=\"option-label\">Restricted inventory<\u002Fdiv>\n                      <div class=\"option-note\">Limit by category, geography, or both. Specify your preferences below.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div class=\"cat-section\">\n                  <div class=\"cat-label\">Available top-level categories<\u002Fdiv>\n                  <div class=\"chip-row\">\n                    <span class=\"chip top\">Music<\u002Fspan>\n                    <span class=\"chip top\">Sports<\u002Fspan>\n                    <span class=\"chip top\">Culture, Theatre &amp; Arts<\u002Fspan>\n                    <span class=\"chip top\">Festivals<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"cat-label\" style=\"margin-top: 10px;\">Example subcategories (Music)<\u002Fdiv>\n                  <div class=\"chip-row\">\n                    <span class=\"chip\">Alternative &amp; Indie<\u002Fspan>\n                    <span class=\"chip\">Chart &amp; Pop<\u002Fspan>\n                    <span class=\"chip\">Classical<\u002Fspan>\n                    <span class=\"chip\">Club &amp; Dance<\u002Fspan>\n                    <span class=\"chip\">Electronic<\u002Fspan>\n                    <span class=\"chip\">Jazz, Soul &amp; Funk<\u002Fspan>\n                    <span class=\"chip\">Rock &amp; Pop<\u002Fspan>\n                    <span class=\"chip\">R&amp;B<\u002Fspan>\n                    <span class=\"chip\">Rap &amp; Hip Hop<\u002Fspan>\n                    <span class=\"chip\">+ more<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"cat-label\" style=\"margin-top: 10px;\">Example subcategories (Sports)<\u002Fdiv>\n                  <div class=\"chip-row\">\n                    <span class=\"chip\">Football<\u002Fspan>\n                    <span class=\"chip\">Cricket<\u002Fspan>\n                    <span class=\"chip\">Tennis<\u002Fspan>\n                    <span class=\"chip\">Rugby<\u002Fspan>\n                    <span class=\"chip\">Golf<\u002Fspan>\n                    <span class=\"chip\">Motorsports<\u002Fspan>\n                    <span class=\"chip\">Athletics<\u002Fspan>\n                    <span class=\"chip\">Basketball<\u002Fspan>\n                    <span class=\"chip\">Darts<\u002Fspan>\n                    <span class=\"chip\">Snooker<\u002Fspan>\n                    <span class=\"chip\">+ more<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"margin-top: 1rem;\">\n                  <div class=\"field-label\">Any specific restrictions? (optional)<\u002Fdiv>\n                  <textarea class=\"text-input\" rows=\"3\" placeholder=\"e.g. UK events only, exclude bullfighting, music and sport categories only…\"><\u002Ftextarea>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- 4. Commission -->\n          <details class=\"acc-item\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\"><line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"23\"><\u002Fline><path d=\"M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Commission <span class=\"badge badge-optional\">Optional<\u002Fspan><\u002Fdiv>\n                <div class=\"acc-subtitle\">Revenue share on tickets sold through your portal<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <p class=\"acc-desc\">You can choose to earn a commission on every ticket sold through your portal — a flat percentage of each transaction, paid to you automatically. This is entirely optional, and some partners prefer to offer the service as a pure customer benefit with no commercial arrangement attached.<\u002Fp>\n                <div class=\"option-group\">\n                  <div class=\"toggle-row\">\n                    <div>\n                      <div class=\"toggle-label\">Enable commission<\u002Fdiv>\n                      <div class=\"toggle-sublabel\">Receive a percentage of every ticket sale through your portal<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div id=\"commission-toggle\" class=\"toggle off\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div id=\"commission-slider-wrap\" style=\"display:none; margin-top: 0.5rem;\">\n                  <div class=\"field-label\">Commission rate<\u002Fdiv>\n                  <div class=\"commission-row\">\n                    <input id=\"commission-range\" type=\"range\" min=\"1\" max=\"10\" step=\"1\" value=\"5\">\n                    <div id=\"commission-val\" class=\"commission-val\">5%<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"commission-note\">We recommend 5% or below. Maximum available: 10%.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- 5. Customer communications -->\n          <details class=\"acc-item\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"><\u002Fpath><polyline points=\"22,6 12,13 2,6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Customer communications <span class=\"badge badge-optional\">Optional<\u002Fspan><\u002Fdiv>\n                <div class=\"acc-subtitle\">Branded emails sent to your customers<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <p class=\"acc-desc\">Transactional emails — order confirmations, ticket delivery notifications, and support responses — are sent to your customers as part of the standard service. By default these carry Likewize Moments branding. You can optionally have them restyled to match your brand.<\u002Fp>\n                <div class=\"option-group\">\n                  <div class=\"option-row recommended\">\n                    <div class=\"option-radio\"><\u002Fdiv>\n                    <div>\n                      <div class=\"option-label\">Likewize Moments branded emails <span class=\"rec-tag\">Default<\u002Fspan><\u002Fdiv>\n                      <div class=\"option-note\">Standard email templates. No additional setup required.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"option-row\">\n                    <div class=\"option-radio\"><\u002Fdiv>\n                    <div>\n                      <div class=\"option-label\">Partner-branded emails<\u002Fdiv>\n                      <div class=\"option-note\">Emails restyled with your logo, colours and sender name. You provide your brand assets and we handle the rest.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <hr class=\"divider\">\n\n      <!-- SECTION 3 -->\n      <div class=\"section\">\n        <div class=\"section-eyebrow\">Section 3<\u002Fdiv>\n        <div class=\"section-title\">Optional extras<\u002Fdiv>\n        <p class=\"section-intro\">Beyond the core ticket marketplace, Likewize Moments can be extended with additional services that add real value for your customers — and strengthen your overall proposition. Each of these is a partner-level decision; we'll work through the details together if any are of interest.<\u002Fp>\n\n        <div class=\"extras-grid\">\n\n          <div class=\"extra-card\">\n            <div class=\"extra-icon-wrap\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"extra-title\">Ticket protection<\u002Fdiv>\n            <div class=\"extra-desc\">Give your customers peace of mind when booking. Ticket protection can be offered as a standalone add-on at checkout, as a one-time option per purchase, or — if you already offer a protection service powered by Likewize — extended seamlessly to cover tickets as part of that existing relationship.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"extra-card\">\n            <div class=\"extra-icon-wrap\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z\"><\u002Fpath><path d=\"M14.05 2a9 9 0 0 1 8 7.94\"><\u002Fpath><path d=\"M14.05 6A5 5 0 0 1 18 10\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"extra-title\">eSIM<\u002Fdiv>\n            <div class=\"extra-desc\">For customers travelling to events, an eSIM option ensures they stay connected wherever they're headed. A lightweight, high-value add-on that's particularly relevant for international events or customers who travel frequently.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"extra-card\">\n            <div class=\"extra-icon-wrap\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z\"><\u002Fpath><path d=\"M10.3 21a1.94 1.94 0 0 0 3.4 0\"><\u002Fpath><path d=\"M6 10h.01\"><\u002Fpath><path d=\"M6 14h.01\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"extra-title\">Airport lounge access<\u002Fdiv>\n            <div class=\"extra-desc\">Help your customers travel in comfort. Lounge access can be offered alongside ticket purchases for events that involve travel, adding a premium dimension to the experience and differentiating your portal from a standard ticket site.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"extra-card\">\n            <div class=\"extra-icon-wrap\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"2\" width=\"14\" height=\"20\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M12 18h.01\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"extra-title\">Device protection<\u002Fdiv>\n            <div class=\"extra-desc\">Keep your customers' devices covered at events where phones are most at risk. If you already have a device protection relationship with Likewize, this can be surfaced directly within the portal. If not, we can add it as a new offer — giving your customers comprehensive cover from the moment they book.<\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <hr class=\"divider\">\n\n      <!-- SECTION 4 -->\n      <div class=\"section\">\n        <div class=\"section-eyebrow\">Section 4<\u002Fdiv>\n        <div class=\"section-title\">What we need from you<\u002Fdiv>\n        <p class=\"section-intro\">To build and launch your portal, we'll need the following from you. The checklist below covers everything from brand assets to key contacts. We'll also be in touch separately regarding the commercial agreement — but the items here are what we need to get the build underway.<\u002Fp>\n\n        <div class=\"accordion\">\n\n          <!-- Group: Brand assets -->\n          <details class=\"acc-item\" open=\"\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z\"><\u002Fpath><path d=\"M2 12h20\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Brand assets<\u002Fdiv>\n                <div class=\"acc-subtitle\">Logo, colours, portal name and domain<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <div class=\"req-list\">\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Portal name <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The name your customers will see throughout the portal experience (e.g. \"[Partner] Tickets\").<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Logo <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">Your brand logo as an SVG or high-resolution PNG, ideally on a transparent background.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Colour palette <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">Primary and accent brand colours as hex values. If you have brand guidelines, please share those too.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Domain / URL <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The web address you'd like your customers to use. You'll need to be able to configure DNS for this domain or subdomain.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot optional\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Email brand assets <span class=\"badge badge-optional\">If partner-branded emails selected<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">Logo and colour details for transactional emails. Often covered by the above — let us know if you have separate email guidelines.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- Group: Authentication -->\n          <details class=\"acc-item\" open=\"\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Authentication<\u002Fdiv>\n                <div class=\"acc-subtitle\">Technical details for customer login<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <div class=\"req-list\">\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">SSO configuration details <span class=\"badge badge-required\">If using your own SSO<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">Protocol (e.g. SAML, OIDC), identity provider details, and any relevant endpoints or certificates. Your technical contact will be able to supply these.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- Group: Inventory & configuration -->\n          <details class=\"acc-item\" open=\"\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3\"><\u002Fpolygon><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Inventory &amp; configuration preferences<\u002Fdiv>\n                <div class=\"acc-subtitle\">Scope, market and commission decisions<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <div class=\"req-list\">\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Inventory scope preference <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">Confirmation of whether you want the full inventory or a restricted set — and if restricted, details of any category or geographic filters.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Target market <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The country or countries your customers are based in. This informs how the portal is configured for language, currency, and compliance purposes.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot optional\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Commission preference <span class=\"badge badge-optional\">Optional<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">Whether you'd like to enable commission, and at what percentage. No action needed if you're happy with the default (no commission).<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n          <!-- Group: Contacts -->\n          <details class=\"acc-item\" open=\"\">\n            <summary class=\"acc-header\">\n              <div class=\"acc-icon-wrap\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"acc-header-text\">\n                <div class=\"acc-title\">Key contacts<\u002Fdiv>\n                <div class=\"acc-subtitle\">The people we'll need to work with on your side<\u002Fdiv>\n              <\u002Fdiv>\n              <svg class=\"acc-chevron\" viewBox=\"0 0 24 24\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fsummary>\n            <div class=\"acc-body\">\n              <div class=\"acc-body-inner\">\n                <div class=\"req-list\">\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Primary contact <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The person who owns this project on your side — our main point of contact for decisions, sign-offs, and day-to-day communication during the build.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Technical contact <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The person responsible for domain configuration, SSO integration (if applicable), and any technical tasks during setup.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Marketing contact <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The person who can supply and approve brand assets, review portal designs, and sign off on customer-facing communications.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"req-row\">\n                    <div class=\"req-dot required\"><\u002Fdiv>\n                    <div class=\"req-content\">\n                      <div class=\"req-title\">Legal contact <span class=\"badge badge-required\">Required<\u002Fspan><\u002Fdiv>\n                      <div class=\"req-desc\">The person to liaise with on agreements, data protection, and any compliance matters arising during or after the build.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <hr class=\"divider\">\n\n      <!-- SECTION 5 -->\n      <div class=\"section\">\n        <div class=\"section-eyebrow\">Section 5<\u002Fdiv>\n        <div class=\"section-title\">Timelines &amp; next steps<\u002Fdiv>\n        <p class=\"section-intro\">From initial agreement to a live, branded portal in 12 weeks. Here's how the process works and what to expect at each stage.<\u002Fp>\n\n        <!-- Process steps -->\n        <div class=\"process-steps\">\n\n          <div class=\"process-step\">\n            <div class=\"step-indicator\">\n              <div class=\"step-circle\">1<\u002Fdiv>\n              <div class=\"step-line\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"step-body\">\n              <div class=\"step-title\">Commercial agreement<\u002Fdiv>\n              <div class=\"step-desc\">We agree the commercial terms of the partnership. Once signed, we move straight into configuration — there's no waiting period between agreement and getting started.<\u002Fdiv>\n              <div class=\"step-meta\">Week 1<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"process-step\">\n            <div class=\"step-indicator\">\n              <div class=\"step-circle milestone\">◆<\u002Fdiv>\n              <div class=\"step-line\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"step-body\">\n              <div class=\"step-title\">Configuration sign-off <span class=\"milestone-tag\">Milestone<\u002Fspan><\u002Fdiv>\n              <div class=\"step-desc\">You confirm your choices from Section 2 and provide everything listed in Section 4. This is the green light for the build to begin — the more complete your inputs at this point, the smoother the build.<\u002Fdiv>\n              <div class=\"step-meta\">End of week 2<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"process-step\">\n            <div class=\"step-indicator\">\n              <div class=\"step-circle\">3<\u002Fdiv>\n              <div class=\"step-line\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"step-body\">\n              <div class=\"step-title\">Build<\u002Fdiv>\n              <div class=\"step-desc\">We build your branded portal — applying your brand, configuring authentication, scoping your inventory, and setting up all integrations. You'll receive regular progress updates throughout.<\u002Fdiv>\n              <div class=\"step-meta\">Weeks 3–10 &nbsp;·&nbsp; 8 weeks<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"process-step\">\n            <div class=\"step-indicator\">\n              <div class=\"step-circle\">4<\u002Fdiv>\n              <div class=\"step-line\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"step-body\">\n              <div class=\"step-title\">Testing &amp; sign-off<\u002Fdiv>\n              <div class=\"step-desc\">We run a full test of the portal end-to-end. You're welcome to participate in testing alongside us — many partners find this a useful opportunity to experience the portal as their customers will. Nothing goes live until both sides are satisfied and formal sign-off is given.<\u002Fdiv>\n              <div class=\"step-meta\">Week 11 &nbsp;·&nbsp; 1 week<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"process-step last\">\n            <div class=\"step-indicator\">\n              <div class=\"step-circle launch\">🚀<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"step-body\">\n              <div class=\"step-title\">Launch<\u002Fdiv>\n              <div class=\"step-desc\">Your portal goes live. Your customers can start browsing and booking from day one, with full support in place from the moment the doors open.<\u002Fdiv>\n              <div class=\"step-meta\">Week 12<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Gantt chart -->\n        <div class=\"gantt-wrap\">\n          <div class=\"gantt-label-row\">\n            <div class=\"gantt-phase-col\"><\u002Fdiv>\n            <div class=\"gantt-weeks\">\n              <span>Wk 1<\u002Fspan><span>Wk 2<\u002Fspan><span>Wk 3<\u002Fspan><span>Wk 4<\u002Fspan>\n              <span>Wk 5<\u002Fspan><span>Wk 6<\u002Fspan><span>Wk 7<\u002Fspan><span>Wk 8<\u002Fspan>\n              <span>Wk 9<\u002Fspan><span>Wk 10<\u002Fspan><span>Wk 11<\u002Fspan><span>Wk 12<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"gantt-row\">\n            <div class=\"gantt-phase-col\">Commercial agreement<\u002Fdiv>\n            <div class=\"gantt-track\">\n              <div class=\"gantt-bar\" style=\"left:0%; width:8.33%; background:#3200BE;\"><\u002Fdiv>\n              <div class=\"gantt-milestone\" style=\"left:16.66%;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"gantt-row\">\n            <div class=\"gantt-phase-col\">Build<\u002Fdiv>\n            <div class=\"gantt-track\">\n              <div class=\"gantt-bar\" style=\"left:16.66%; width:66.67%; background:#3200BE;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"gantt-row\">\n            <div class=\"gantt-phase-col\">Testing<\u002Fdiv>\n            <div class=\"gantt-track\">\n              <div class=\"gantt-bar\" style=\"left:83.33%; width:8.33%; background:#3200BE;\"><\u002Fdiv>\n              <div class=\"gantt-bar sub\" style=\"left:83.33%; width:8.33%; background:#FF96FF; top:22px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"gantt-row\">\n            <div class=\"gantt-phase-col\">Launch<\u002Fdiv>\n            <div class=\"gantt-track\">\n              <div class=\"gantt-milestone launch-dot\" style=\"left:100%;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"gantt-legend\">\n            <div class=\"legend-item\"><span class=\"legend-swatch\" style=\"background:#3200BE;\"><\u002Fspan> Likewize<\u002Fdiv>\n            <div class=\"legend-item\"><span class=\"legend-swatch\" style=\"background:#FF96FF;\"><\u002Fspan> Partner (optional)<\u002Fdiv>\n            <div class=\"legend-item\"><span class=\"legend-diamond\"><\u002Fspan> Milestone<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Closing -->\n        <div class=\"closing-block\">\n          <div class=\"closing-inner\">\n            <div class=\"closing-icon\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 11.08V12a10 10 0 1 1-5.93-9.14\"><\u002Fpath><polyline points=\"22 4 12 14.01 9 11.01\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"closing-title\">Let's build something great together.<\u002Fdiv>\n              <div class=\"closing-desc\">We're genuinely excited about what Likewize Moments can offer your customers. If you're ready to take the next step, your Likewize contact will get the process moving. We can't wait to launch this with you.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div class=\"doc-footer\">\n        <span>Likewize Moments — Tickets &nbsp;|&nbsp; Partner Portal Overview<\u002Fspan>\n        <span>DRAFT — Internal use only<\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <script>\n      var toggleEl = document.getElementById('commission-toggle');\n      var sliderWrap = document.getElementById('commission-slider-wrap');\n      var range = document.getElementById('commission-range');\n      var val = document.getElementById('commission-val');\n      var enabled = false;\n\n      toggleEl.addEventListener('click', function () {\n        enabled = !enabled;\n        toggleEl.className = enabled ? 'toggle' : 'toggle off';\n        sliderWrap.style.display = enabled ? 'block' : 'none';\n      });\n\n      range.addEventListener('input', function () {\n        val.textContent = range.value + '%';\n      });\n    <\u002Fscript>\n  \n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
