    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

    // would push the parser into quirks mode. DOMParser always emits a <head>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9a92a0fe-95b7-4914-9c6e-ea5b6ddd34b3\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<!-- @template name=\"Ticket Protection\" description=\"Single branded slide explaining how ticket protection works, at 1920x1080\" -->\n<helmet>\n  <script src=\"219cd95b-dbf6-466d-82bf-5747b008e1ae\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: #0B0B0D; }\n    .lw-slide {\n      width: 1920px; height: 1080px; box-sizing: border-box;\n      font-family: \"Likewize Sans\", system-ui, sans-serif;\n      position: relative; overflow: hidden;\n      display: flex; flex-direction: column;\n    }\n    .lw-eyebrow {\n      font-size: 22px; font-weight: 700; letter-spacing: 0.18em;\n      text-transform: uppercase; margin: 0;\n    }\n    .lw-kicker-dot { display: inline-block; width: 14px; height: 14px; border-radius: 999px; background: var(--lw-pink); }\n    .tp-card {\n      background: var(--lw-gray-50); border: 1px solid var(--lw-gray-200); border-radius: 18px;\n      padding: 44px 40px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box;\n    }\n    .tp-icon-circle {\n      width: 72px; height: 72px; border-radius: 999px; display: flex; align-items: center; justify-content: center; margin-bottom: 32px;\n    }\n    .tp-eyebrow-num { font-size: 20px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--lw-blue); margin: 0 0 14px; }\n    .tp-statement { font-size: 42px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.08; color: var(--lw-gray-900); margin: 0 0 18px; }\n    .tp-desc { font-size: 24px; line-height: 1.4; color: var(--lw-gray-600); margin: 0; }\n    .tp-caveat { font-size: 21px; line-height: 1.4; color: var(--lw-gray-500); margin: 24px 0 0; padding-top: 20px; border-top: 1px solid var(--lw-gray-200); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"16be0e17-0e83-4710-b7e7-28a8730ddecd#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n  <section class=\"lw-slide\" data-label=\"How ticket protection works\" style=\"background:#FFFFFF; color:#0B0B0D; padding:96px 120px 72px;\">\n\n    <div style=\"display:flex; align-items:center; gap:18px; margin-bottom:28px;\">\n      <span class=\"lw-kicker-dot\"><\u002Fspan>\n      <p class=\"lw-eyebrow\" style=\"color:var(--lw-blue);\">Ticket Protection<\u002Fp>\n    <\u002Fdiv>\n\n    <h1 style=\"font-size:88px; font-weight:800; letter-spacing:-0.03em; line-height:1.02; margin:0 0 56px;\">How ticket protection works<\u002Fh1>\n\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:36px; flex:1;\">\n\n      <div class=\"tp-card\">\n        <div class=\"tp-icon-circle\" style=\"background:var(--lw-pink);\">\n          <x-import component-from-global-scope=\"LikewizeDesignSystem_c61cfa.Icon\" name=\"file\" size=\"34\" hint-size=\"34px,34px\"><\u002Fx-import>\n        <\u002Fdiv>\n        <p class=\"tp-eyebrow-num\">01 · Cover basis<\u002Fp>\n        <h3 class=\"tp-statement\">Specified reasons cover<\u002Fh3>\n        <p class=\"tp-desc\">A defined list of qualifying reasons — illness, bereavement, transport failure and more.<\u002Fp>\n        <p class=\"tp-caveat\">Cancel-for-any-reason is a travel insurance import — largely unavailable, likely prohibitively expensive.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"tp-card\">\n        <div class=\"tp-icon-circle\" style=\"background:var(--lw-blue); color:#FFFFFF;\">\n          <x-import component-from-global-scope=\"LikewizeDesignSystem_c61cfa.Icon\" name=\"protect\" size=\"34\" hint-size=\"34px,34px\"><\u002Fx-import>\n        <\u002Fdiv>\n        <p class=\"tp-eyebrow-num\">02 · Regulatory route<\u002Fp>\n        <h3 class=\"tp-statement\">Insurance<\u002Fh3>\n        <p class=\"tp-desc\">FCA-regulated cover, FSCS-backed.<\u002Fp>\n        <p class=\"tp-caveat\">Non-insurance doesn't work in the UK — worth re-checking per geography as we expand.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"tp-card\">\n        <div class=\"tp-icon-circle\" style=\"background:var(--lw-frost);\">\n          <x-import component-from-global-scope=\"LikewizeDesignSystem_c61cfa.Icon\" name=\"click\" size=\"34\" hint-size=\"34px,34px\"><\u002Fx-import>\n        <\u002Fdiv>\n        <p class=\"tp-eyebrow-num\">03 · Delivery<\u002Fp>\n        <h3 class=\"tp-statement\">Opt-in add-on at checkout<\u002Fh3>\n        <p class=\"tp-desc\">Customer actively selects it — simple to integrate.<\u002Fp>\n        <p class=\"tp-caveat\">Embedded-by-default isn't offered by any provider.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv><div style=\"margin-top: 40px; background: var(--lw-blue); border-radius: 18px; padding: 36px 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; width: 1565px; height: 66px\">\n      <p style=\"font-size:20px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.72); margin:0;\">What decides the vendor<\u002Fp>\n      <p style=\"font-size:40px; font-weight:800; letter-spacing:-0.01em; color:#FFFFFF; margin:0; text-align:center;\">\n        Commercials <span style=\"color:var(--lw-pink);\">·<\u002Fspan> Integration <span style=\"color:var(--lw-pink);\">·<\u002Fspan> Claims journey\n      <\u002Fp>\n    <\u002Fdiv>\n\n    \n\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
